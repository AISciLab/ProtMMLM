task_name: prmftp
stage: downstream
raw_data_path: ./data/downstream/PrMFTP
pretrain_data_root: ./data/pretrain
pretrain_checkpoint_path: ./outputs/pretrain/esmc600_formal/best.pth
backend_mode: real
model_name: esmc_600m
use_flash_attn: false
sequence_encoder_trainable: true
structure_encoder_trainable: true
fusion_transformer_trainable: true
d_model: 512
projection_dim: 256
sequence_pooling: mean_pool
structure_pooling: mean_pool
fusion_pooling: cls
lambda_align: 0.0
lambda_cons: 0.0
lambda_recon: 0.0
mixed_task_mode: coverage_aware
partial_pair_handling: seq_fallback
aux_loss_reweight_mode: batch_coverage
min_full_fraction_for_aux: 0.1
task_head_type: auto
save_best_guarded_checkpoint: true
monitor_subset: seq_only
monitor_name: Accuracy
split_strategy: prmftp_mmseqs_clustered
mmseqs_binary: mmseqs
cluster_min_seq_id: 0.4
cluster_coverage: 0.8
cluster_cov_mode: 0
cluster_train_fraction: 0.8
cluster_validation_fraction: 0.1
shuffle_train_each_epoch: true
train_shuffle_seed: 42
single_full_sample_oversample_factor: 1
single_missing_task_fallback: seq_adapter
single_task_feature_mode: raw_seq_residual
optimizer: AdamW
learning_rate: 2.0e-05
weight_decay: 0.01
grad_clip: 1.0
device: cuda
batch_size: 16
gradient_accumulation_steps: 1
validation_fraction: 0.1
# num_folds: 5
# test_fold_index: 0
# val_fold_offset: 1
max_residues: 100
max_frames: 160
max_epochs: 100
min_epochs: 5
patience: 5
min_delta: 0.0
validation_interval: 1
show_progress_downstream: true
progress_log_interval_downstream: 50
# notebook-aligned PrMFTP mixed config: random 9:1 validation split from train and Accuracy checkpoint selection
