model_name: esmc_600m
manifest_path: ./data/pretrain/pretrain_manifest.csv
backend_mode: real
checkpoint_path: ./outputs/pretrain/esmc600_formal/latest.pth
use_flash_attn: true
sequence_encoder_trainable: true
d_model: 512
projection_dim: 256
sequence_pooling: mean_pool
structure_pooling: mean_pool
fusion_pooling: cls
st_num_layers: 4
st_num_heads: 8
st_dropout: 0.1
fusion_num_layers: 2
fusion_num_heads: 8
fusion_dropout: 0.1
lambda_align: 0.1
lambda_cons: 1.0
lambda_recon: 0.2
dyn_whole_modality_dropout_prob: 1.0
consistency_mode: cosine
optimizer: AdamW
learning_rate: 3.0e-05
weight_decay: 0.01
grad_clip: 1.0
device: cuda
batch_size_pretrain: 32
max_residues: 100
max_frames: 160
max_epochs_pretrain: 100
validation_ratio_pretrain: 0.05
validation_seed_pretrain: 42
validation_interval_pretrain: 1
checkpoint_interval_pretrain: 5
show_progress_pretrain: true
progress_log_interval_pretrain: 50
min_delta_pretrain: 0.0
tensorboard_log_dir: ./outputs/tensorboard/pretrain/esmc600_formal
